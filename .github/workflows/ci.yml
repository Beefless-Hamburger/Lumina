name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-scripts:
    name: Validate shell scripts
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Validate shell scripts
        run: bash -n build.sh test_logic.sh test_backend.sh

  logic-tests:
    name: Logic tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Run logic tests
        run: bash test_logic.sh

  backend-tests:
    name: Backend tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Run backend tests
        run: bash test_backend.sh

  build:
    name: Optimized app build
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Build app bundle
        run: |
          if BUILD_TARGET="$(uname -m)-apple-macosx13.0" bash build.sh >build.log 2>&1; then
            cat build.log
          else
            printf 'Build failed: '
            tr '\n' ' ' <build.log
            printf '\n'
            exit 1
          fi

      - name: Upload failed build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lumina-build-log
          path: build.log
          retention-days: 1

      - name: Verify app bundle
        run: |
          test -x Build/Lumina.app/Contents/MacOS/Lumina
          codesign --verify --deep --strict Build/Lumina.app

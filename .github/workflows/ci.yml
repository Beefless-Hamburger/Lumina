name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    name: Test and build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run logic tests
        run: bash test_logic.sh

      - name: Run backend tests
        run: bash test_backend.sh

      - name: Build app bundle
        run: bash build.sh
